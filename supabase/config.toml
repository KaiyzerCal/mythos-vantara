# External webhook receivers — Telegram, Gumroad, and Stripe send requests
# without Supabase JWTs, so JWT verification must be disabled for these.
[functions.telegram-webhook]
verify_jwt = false

[functions.telegram-setup]
verify_jwt = false

[functions.mavis-gumroad-webhook]
verify_jwt = false

[functions.mavis-stripe-webhook]
verify_jwt = false

# Widget AI runtime — called directly from customer websites (no Supabase auth)
[functions.mavis-widget-api]
verify_jwt = false

# Stripe widget subscription webhook — Stripe sends no Supabase JWT
[functions.stripe-widget-webhook]
verify_jwt = false

# A2A Protocol gateway — external agents call without Supabase JWT
[functions.mavis-a2a-gateway]
verify_jwt = false

# Resend inbound email webhook — Resend sends no Supabase JWT
[functions.mavis-email-inbound]
verify_jwt = false

# Live voice WebSocket — browsers cannot send Authorization headers on WS upgrade.
# Auth is done via the first WebSocket message instead.
[functions.mavis-live-voice]
verify_jwt = false

# VAPI phone call webhook — VAPI sends no Supabase JWT. Secured by x-vapi-secret header.
[functions.mavis-vapi-webhook]
verify_jwt = false

# External API gateway — validated by x-mavis-api-key header instead of Supabase JWT.
[functions.mavis-api-gateway]
verify_jwt = false

# Autonomous task runner — triggered by pg_cron with service-role key (no user JWT).
[functions.mavis-autonomous-runner]
verify_jwt = false

# Ambient monitor — triggered by pg_cron with service-role key (no user JWT).
[functions.mavis-ambient-monitor]
verify_jwt = false
# Browser agent — called with service-role key from mavis-agent tool executor.
# verify_jwt = true (default) since mavis-agent passes service role key as Bearer token.
# No entry needed — listed for documentation only.

# MCP Server — external MCP clients authenticate via x-mavis-api-key, no Supabase JWT.
