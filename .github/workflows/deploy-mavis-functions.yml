name: Deploy VANTARA (Mavis) Edge Functions
on:
  push:
    branches: ["main"]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-mavis-functions.yml"
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1

      # ── Core agent + Telegram interface ────────────────────────────────────
      - name: Deploy mavis-agent
        run: supabase functions deploy mavis-agent --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-telegram-bot
        run: supabase functions deploy mavis-telegram-bot --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      # ── Action execution + OAuth ────────────────────────────────────────────
      - name: Deploy mavis-action-executor
        run: supabase functions deploy mavis-action-executor --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-google-oauth
        run: supabase functions deploy mavis-google-oauth --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      # ── Autonomous systems ──────────────────────────────────────────────────
      - name: Deploy mavis-orchestrator
        run: supabase functions deploy mavis-orchestrator --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-trigger-engine
        run: supabase functions deploy mavis-trigger-engine --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-goal-agent
        run: supabase functions deploy mavis-goal-agent --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-campaign-runner
        run: supabase functions deploy mavis-campaign-runner --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      # ── Memory + Gmail ──────────────────────────────────────────────────────
      - name: Deploy mavis-memory-embed
        run: supabase functions deploy mavis-memory-embed --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-gmail-webhook
        run: supabase functions deploy mavis-gmail-webhook --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-gmail-sync
        run: supabase functions deploy mavis-gmail-sync --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-gmail-watch
        run: supabase functions deploy mavis-gmail-watch --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      # ── Legacy functions (keep deployed) ───────────────────────────────────
      - name: Deploy mavis-chat
        run: supabase functions deploy mavis-chat --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-morning-brief
        run: supabase functions deploy mavis-morning-brief --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-heartbeat
        run: supabase functions deploy mavis-heartbeat --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-vision-agent
        run: supabase functions deploy mavis-vision-agent --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy telegram-setup
        run: supabase functions deploy telegram-setup --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy telegram-webhook
        run: supabase functions deploy telegram-webhook --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-capability-audit
        run: supabase functions deploy mavis-capability-audit --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      # ── Observability + learning ────────────────────────────────────────────
      - name: Deploy mavis-health-monitor
        run: supabase functions deploy mavis-health-monitor --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-learning-engine
        run: supabase functions deploy mavis-learning-engine --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
