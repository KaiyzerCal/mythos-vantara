name: Deploy VANTARA (Mavis) Edge Functions
on:
  push:
    branches: ["main"]
    paths:
      - "supabase/functions/mavis-chat/**"
      - "supabase/functions/mavis-actions/**"
      - ".github/workflows/deploy-mavis-functions.yml"
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
      - name: Deploy mavis-chat
        run: supabase functions deploy mavis-chat --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Deploy mavis-actions
        run: supabase functions deploy mavis-actions --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}