name: Deploy VANTARA (Mavis) Edge Functions

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-mavis-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1

      # ── Core functions — deployed serially, fail-fast ─────────────────────────
      # If any of these fail the entire workflow stops.
      - name: Deploy core functions (fail-fast)
        run: |
          set -euo pipefail
          CORE=(
            mavis-chat
            mavis-actions
            mavis-agent
            mavis-action-executor
            mavis-telegram-bot
            telegram-webhook
            telegram-setup
            mavis-heartbeat
            mavis-dream
            mavis-orchestrator
            mavis-trigger-engine
            mavis-consolidate
            mavis-brain-consolidate
            mavis-council-session
            mavis-council-heartbeat
            mavis-morning-brief
            mavis-memory-embed
            mavis-goal-engine
            mavis-goal-loop
            mavis-goal-agent
            mavis-autonomous-runner
            mavis-gmail-webhook
            mavis-gmail-sync
            mavis-gmail-watch
            mavis-google-oauth
            mavis-push-notify
          )
          for fn in "${CORE[@]}"; do
            if [ -d "supabase/functions/$fn" ]; then
              echo "→ $fn"
              supabase functions deploy "$fn" --project-ref "$PROJECT_REF"
            else
              echo "::warning::Core function '$fn' directory not found — skipping"
            fi
          done

      # ── All remaining functions — 8 parallel workers, best-effort ────────────
      # Failures are logged as warnings but do not fail the workflow.
      - name: Deploy all remaining functions (parallel)
        run: |
          CORE=(
            mavis-chat mavis-actions mavis-agent mavis-action-executor
            mavis-telegram-bot telegram-webhook telegram-setup mavis-heartbeat
            mavis-dream mavis-orchestrator mavis-trigger-engine mavis-consolidate
            mavis-brain-consolidate mavis-council-session mavis-council-heartbeat
            mavis-morning-brief mavis-memory-embed mavis-goal-engine mavis-goal-loop
            mavis-goal-agent mavis-autonomous-runner mavis-gmail-webhook mavis-gmail-sync
            mavis-gmail-watch mavis-google-oauth mavis-push-notify
          )
          printf '%s\n' "${CORE[@]}" > /tmp/core-fns.txt

          mapfile -t REMAINING < <(ls supabase/functions/ | grep -vxFf /tmp/core-fns.txt)
          echo "Deploying ${#REMAINING[@]} non-core functions with 8 parallel workers..."

          FAILURES=/tmp/deploy-failures.txt
          > "$FAILURES"

          deploy_fn() {
            local fn="$1"
            if supabase functions deploy "$fn" --project-ref "$PROJECT_REF" 2>&1; then
              echo "✓ $fn"
            else
              echo "$fn" >> /tmp/deploy-failures.txt
              echo "✗ $fn (non-critical)"
            fi
          }
          export -f deploy_fn

          printf '%s\n' "${REMAINING[@]}" | xargs -P 8 -I{} bash -c 'deploy_fn "$@"' _ {}

          TOTAL=${#REMAINING[@]}
          FAIL_COUNT=$(wc -l < "$FAILURES" 2>/dev/null | tr -d ' ')
          SUCCESS=$((TOTAL - FAIL_COUNT))
          echo ""
          echo "Result: $SUCCESS/$TOTAL non-core functions deployed."

          if [ -s "$FAILURES" ]; then
            echo "::warning::$FAIL_COUNT non-core function(s) failed to deploy:"
            cat "$FAILURES"
          fi
