name: Deploy VANTARA (Mavis) Edge Functions
on:
  push:
    branches: ["main"]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-mavis-functions.yml"
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
      - name: Deploy mavis-chat
        run: supabase functions deploy mavis-chat --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-actions
        run: supabase functions deploy mavis-actions --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-morning-brief
        run: supabase functions deploy mavis-morning-brief --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-proactive-nudge
        run: supabase functions deploy mavis-proactive-nudge --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-archivist
        run: supabase functions deploy mavis-archivist --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-so-curator
        run: supabase functions deploy mavis-so-curator --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-user-model-refresh
        run: supabase functions deploy mavis-user-model-refresh --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-goal-judge
        run: supabase functions deploy mavis-goal-judge --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-design-system-gen
        run: supabase functions deploy mavis-design-system-gen --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-heartbeat
        run: supabase functions deploy mavis-heartbeat --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-skill-catalog
        run: supabase functions deploy mavis-skill-catalog --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-run-doctor
        run: supabase functions deploy mavis-run-doctor --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Deploy mavis-obsidian-export
        run: supabase functions deploy mavis-obsidian-export --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
