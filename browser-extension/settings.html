<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAVIS Clipper — Settings</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0a0a0f;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Header */
    header {
      border-bottom: 1px solid #1e1e2e;
      padding-bottom: 16px;
    }

    header h1 {
      font-family: monospace;
      font-size: 20px;
      font-weight: bold;
      color: #8b5cf6;
      letter-spacing: 0.1em;
    }

    header p {
      margin-top: 4px;
      font-size: 13px;
      color: #6b7280;
    }

    /* Form */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: #a1a1b5;
      font-family: monospace;
      letter-spacing: 0.04em;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 6px;
      color: #e2e8f0;
      font-family: monospace;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #8b5cf6;
    }

    input::placeholder {
      color: #4a4a6a;
    }

    /* Save button */
    #save-btn {
      background: #8b5cf6;
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 6px;
      padding: 12px;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
    }

    #save-btn:hover {
      background: #7c3aed;
    }

    /* Status */
    #status {
      font-family: monospace;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }

    /* Help text */
    .help {
      font-size: 12px;
      color: #6b7280;
      background: #111118;
      border: 1px solid #1e1e2e;
      border-left: 2px solid #8b5cf6;
      border-radius: 4px;
      padding: 10px 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>MAVIS CLIPPER</h1>
      <p>Configure your Supabase connection</p>
    </header>

    <div class="field">
      <label for="supabase-url">SUPABASE URL</label>
      <input
        type="text"
        id="supabase-url"
        placeholder="https://xxxx.supabase.co"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <div class="field">
      <label for="access-token">ACCESS TOKEN</label>
      <input
        type="password"
        id="access-token"
        placeholder="Your Supabase JWT access token"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <button id="save-btn">SAVE SETTINGS</button>

    <div id="status"></div>

    <div class="help">
      Find your access token in <strong>MAVIS → Settings → Account</strong>, or from the
      <strong>Supabase Auth dashboard</strong> under your project's API settings.
      The token is used to authenticate clips sent to the
      <code>mavis-ingest-url</code> edge function.
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
