<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAVIS Clipper</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 400px;
      min-height: 320px;
      background-color: #0a0a0f;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    /* Header */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1e1e2e;
      padding-bottom: 12px;
    }

    #header h1 {
      font-family: monospace;
      font-size: 16px;
      font-weight: bold;
      color: #8b5cf6;
      letter-spacing: 0.1em;
    }

    #header .version {
      font-size: 11px;
      color: #4a4a6a;
      font-family: monospace;
    }

    /* URL display */
    #url-display {
      font-size: 12px;
      color: #6b7280;
      word-break: break-all;
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 4px;
      padding: 6px 8px;
      font-family: monospace;
    }

    /* Selection preview */
    #selection-preview {
      display: none;
      font-style: italic;
      font-size: 12px;
      color: #6b7280;
      background: #111118;
      border: 1px solid #1e1e2e;
      border-left: 2px solid #8b5cf6;
      border-radius: 4px;
      padding: 6px 8px;
      max-height: 60px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    /* Note textarea */
    #note-input {
      width: 100%;
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 4px;
      color: #e2e8f0;
      font-family: inherit;
      font-size: 13px;
      padding: 8px;
      resize: vertical;
      min-height: 64px;
      outline: none;
      transition: border-color 0.15s;
    }

    #note-input:focus {
      border-color: #8b5cf6;
    }

    #note-input::placeholder {
      color: #4a4a6a;
    }

    /* Clip button */
    #clip-btn {
      width: 100%;
      background: #8b5cf6;
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 6px;
      padding: 10px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #clip-btn:hover:not(:disabled) {
      background: #7c3aed;
    }

    #clip-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Status */
    #status {
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      font-family: monospace;
    }

    /* Footer */
    #footer {
      margin-top: auto;
      padding-top: 8px;
      border-top: 1px solid #1e1e2e;
      text-align: right;
    }

    #settings-link {
      font-size: 12px;
      color: #6b7280;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      padding: 0;
    }

    #settings-link:hover {
      color: #8b5cf6;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>MAVIS CLIPPER</h1>
    <span class="version">v1.0.0</span>
  </div>

  <div id="url-display">Loading…</div>

  <div id="selection-preview"></div>

  <textarea
    id="note-input"
    rows="3"
    placeholder="Add a note (optional)"
  ></textarea>

  <button id="clip-btn">CLIP TO VAULT</button>

  <div id="status"></div>

  <div id="footer">
    <button id="settings-link">Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
